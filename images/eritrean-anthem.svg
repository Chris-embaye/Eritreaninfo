<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <!-- Background -->
  <rect width="600" height="400" fill="#fff"/>

  <!-- Green triangle (top) -->
  <polygon points="0,0 600,0 600,200 0,200" fill="#4DAA4D"/>
  <!-- Blue triangle (bottom) -->
  <polygon points="0,200 600,200 600,400 0,400" fill="#0033A0"/>
  <!-- Red triangle (left) -->
  <polygon points="0,0 0,400 520,200" fill="#E8112D"/>

  <!-- Gold olive wreath -->
  <g transform="translate(180,200)" fill="none" stroke="#FADA5E" stroke-width="5">
    <!-- wreath circle -->
    <circle cx="0" cy="0" r="72" stroke="#FADA5E" stroke-width="4" fill="none"/>
    <!-- left branch leaves -->
    <ellipse cx="-40" cy="-55" rx="9" ry="18" fill="#FADA5E" transform="rotate(30,-40,-55)"/>
    <ellipse cx="-58" cy="-32" rx="9" ry="18" fill="#FADA5E" transform="rotate(55,-58,-32)"/>
    <ellipse cx="-68" cy="-5"  rx="9" ry="18" fill="#FADA5E" transform="rotate(80,-68,-5)"/>
    <ellipse cx="-68" cy="22"  rx="9" ry="18" fill="#FADA5E" transform="rotate(100,-68,22)"/>
    <ellipse cx="-55" cy="48"  rx="9" ry="18" fill="#FADA5E" transform="rotate(130,-55,48)"/>
    <!-- right branch leaves -->
    <ellipse cx="40"  cy="-55" rx="9" ry="18" fill="#FADA5E" transform="rotate(-30,40,-55)"/>
    <ellipse cx="58"  cy="-32" rx="9" ry="18" fill="#FADA5E" transform="rotate(-55,58,-32)"/>
    <ellipse cx="68"  cy="-5"  rx="9" ry="18" fill="#FADA5E" transform="rotate(-80,68,-5)"/>
    <ellipse cx="68"  cy="22"  rx="9" ry="18" fill="#FADA5E" transform="rotate(-100,68,22)"/>
    <ellipse cx="55"  cy="48"  rx="9" ry="18" fill="#FADA5E" transform="rotate(-130,55,48)"/>
    <!-- stem bottom -->
    <line x1="-30" y1="65" x2="30" y2="65" stroke="#FADA5E" stroke-width="5" stroke-linecap="round"/>
    <!-- center star -->
    <polygon points="0,-28 6,-10 24,-10 10,2 16,20 0,10 -16,20 -10,2 -24,-10 -6,-10" fill="#FADA5E"/>
  </g>

  <!-- Anthem label -->
  <rect x="0" y="355" width="600" height="45" fill="rgba(0,0,0,0.55)"/>
  <text x="300" y="384" text-anchor="middle" font-family="Georgia,serif" font-size="17" fill="#FADA5E" letter-spacing="3">ኤርትራ ኤርትራ ኤርትራ — National Anthem</text>
</svg>
